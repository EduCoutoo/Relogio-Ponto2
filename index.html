0<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bater Ponto</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(90deg, rgba(94, 255, 175, 1) 0%, rgba(227, 255, 241, 1) 15%, rgba(255, 255, 255, 1) 30%, rgba(255, 255, 255, 1) 50%, rgba(255, 255, 255, 1) 70%, rgba(227, 255, 241, 1) 85%, rgba(94, 255, 175, 1) 100%);
      padding: 40px;
      color: black;
    }
    h1 { font-size: 4rem; margin-bottom: 20px; color: black; }
    select, button {
      font-size: 1.1rem;
      padding: 1.5rem 3rem;
      margin: 15px;
      border-radius: 15px;
      border: none;
    }
    select {
      color: #333;
    }
    button {
      background-color: #2980b9;
      color: white;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover {
      transform: scale(1.05);
    }
    #msg { font-size: 1.5rem; margin-top: 30px; font-weight: bold; color: black; }
    .popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #e74c3c;
      color: #fff;
      padding: 40px 60px;
      border-radius: 20px;
      font-size: 2.5rem;
      display: none;
      box-shadow: 0 0 30px rgba(0,0,0,0.3);
      z-index: 1000;
    }
  </style>
</head>
<body>
  <h1>Relógio de Ponto</h1>

  <select id="nome">
    <option value="">-- Selecione seu nome --</option>
    <option value="ANTÔNIO">ANTÔNIO</option>
    <option value="EDUARDO">EDUARDO</option>
    <option value="GIOVANA">GIOVANA</option>
    <option value="HILTON">HILTON</option>
    <option value="HILDA">HILDA</option>
    <option value="JOÃO">JOÃO</option>
    <option value="PABLO">PABLO</option>
    <option value="PAULO">PAULO</option>
    <option value="PAULO SILVA">PAULO SILVA</option> 
    <option value="PRISCILA">PRISCILA</option>
    <option value="VANESSA">VANESSA</option>

  </select><br>

  <select id="tipoPonto">
    <option value="">-- Tipo de ponto --</option>
    <option value="Entrada Manhã">Entrada Manhã</option>
    <option value="Saída Café (Manhã)">Saída Café (Manhã)</option>
    <option value="Volta Café (Manhã)">Volta Café (Manhã)</option>
    <option value="Saída Almoço">Saída Almoço</option>
    <option value="Volta Almoço">Volta Almoço</option>
    <option value="Saída Café (Tarde)">Saída Café (Tarde)</option>
    <option value="Volta Café (Tarde)">Volta Café (Tarde)</option>
    <option value="Saída Tarde">Saída Tarde</option>
  </select><br>

  <button onclick="confirmarPonto()">Bater Ponto</button>

  <div id="msg"></div>
  <div class="popup" id="popup">❌ Fora da área permitida!</div>
  <script>
// 🔒 IMPEDIR QUALQUER USO SE NÃO FOR ACESSO DIRETO (ex: QR Code fresco)
(function() {
  // Detecta tipo de carregamento
  const navEntry = performance.getEntriesByType("navigation")[0];
  const navType = navEntry ? navEntry.type : 
                  performance.navigation ? 
                    (performance.navigation.type === 1 ? "reload" : "navigate") : 
                    "unknown";

  // Só permite se for ACESSO DIRETO (não recarregamento, não histórico)
  if (navType !== "navigate") {
    document.body.innerHTML = `
      <div style="font-family: sans-serif; text-align: center; padding: 40px; background: #fef9f9;">
        <h2 style="color: #d32f2f;">⚠️ Acesso bloqueado</h2>
        <p style="font-size: 1.2rem; color: #555;">
          Para bater o ponto, você precisa <strong>reescanear o QR Code</strong>.
        </p>
        <p style="color: #888; font-size: 0.9rem;">
          Recarregar a página não é suficiente.
        </p>
      </div>
    `;
    throw new Error("Acesso não direto — bloqueado por segurança");
  }
})();
</script>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwcHewyj09jageeljbK9u88ngXe12RNh4XVzrzuMeiK6qF6N5zxeDlDbXQwzLWHNc-a/exec";  
    const LOCAIS_PERMITIDOS = [
  { lat: -23.136030, lon: -47.168871 },
  { lat: -23.126797, lon: -47.164379 }
    ];
    const RAIO_METROS = 270; // +/- inutil por agora
    const TEMPO_MAX = 15;

    //ve se nao fez coisa errada
    let  UltimaV = Date.now();

    // ve se nao esta muito longe do ponto selecionado
    function calcularDistancia(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const toRad = x => x * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    // fala se ta fazendo coisa errada
    function mostrarPopup(msg) {
      const popup = document.getElementById("popup");
      popup.textContent = msg;
      popup.style.display = "block";
      setTimeout(() => popup.style.display = "none", 4000);
    }

    function atualizarMsg(texto, cor="#000") {
      const msg = document.getElementById("msg");
      msg.style.color = cor;
      msg.textContent = texto;
    }
    // confirmação pra nao bater no errado
    function confirmarPonto() {
      const TP = document.getElementById("tipoPonto").value;
      let txt = `Você vai bater o ponto ${TP}`;
      if(confirm(txt) == true)
        baterPonto();
      else
      alert("Selecione o Ponto correto.")
    }
    // ✅ Gera token ÚNICO por carregamento da página (não por sessão!)
  const TOKEN = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    // bate o ponto
    function gerarToken() {
  return Array.from(crypto.getRandomValues(new Uint8Array(16)))
    .map(b => b.toString(16).padStart(2, '0'))
    .join('')
    .substring(0, 16);
}
let jaEnviado = false;
    
function baterPonto() {
  if (jaEnviado) {
    alert("✅ Ponto já enviado. Reescaneie o QR Code para bater outro.");
    return;
  }
  jaEnviado = true;
  const nome = document.getElementById("nome").value;
  const tipo = document.getElementById("tipoPonto").value;

  if (!nome) return alert("⚠️ Selecione seu nome.");
  if (!tipo) return alert("⚠️ Selecione o tipo de ponto.");

  // 🔑 Token = nome + timestamp (últimos 6 dígitos) + segundos arredondados
  // Ex: PAULO_1712345678_45 → só válido por ~30s
  const now = Math.floor(Date.now() / 1000); // segundos
  const slot = Math.floor(now / 30); // bloco de 30s
  const token = `${nome}_${now % 1000000}_${slot}`;

  atualizarMsg("📍 Localizando…");

  const timeout = setTimeout(() => {
    atualizarMsg("");
    alert("⏰ Tempo esgotado para obter localização.");
  }, 6000);

  navigator.geolocation.getCurrentPosition(
    function(pos) {
      clearTimeout(timeout);
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      const dentroDeRaio = LOCAIS_PERMITIDOS.some(local =>
        calcularDistancia(local.lat, local.lon, lat, lon) <= RAIO_METROS
      );

      if (!dentroDeRaio) {
        mostrarPopup("❌ Fora da área permitida!");
        atualizarMsg("");
        return;
      }

      // ✅ Feedback IMEDIATO — usuário vê sucesso antes do envio terminar
atualizarMsg(`✅ ${tipo} registrada`, "#27ae60");

// ✅ Prepara os dados
const body = `nome=${encodeURIComponent(nome)}&lat=${lat}&lon=${lon}&tipo=${encodeURIComponent(tipo)}&token=${encodeURIComponent(TOKEN)}`;

// ✅ Timeout de 2.5s só para detectar falhas reais (não cold start)
const controller = new AbortController();
const timeoutId = setTimeout(() => controller.abort(), 2500);

// ✅ Envia com keepalive: true (continua após sair da página)
fetch(SCRIPT_URL, {
  method: "POST",
  headers: { "Content-Type": "application/x-www-form-urlencoded" },
  body: body,
  keepalive: true,      // ← permite continuar após fechar aba
  signal: controller.signal
})
.then(response => {
  clearTimeout(timeoutId);
  if (!response.ok) throw new Error("Erro HTTP");
  return response.text();
})
.then(msg => {
  // Se respondeu rápido: só corrige se for erro
  if (msg.startsWith("❌")) {
    atualizarMsg(msg, "#e74c3c");
    jaEnviado = false;
  }
})
.catch(err => {
  clearTimeout(timeoutId);
  if (err.name === "AbortError") {
    // ✅ Timeout = provavelmente cold start — mas dados estão sendo processados!
    console.log("⏰ Cold start — processamento em background");
    // Nada muda: usuário já viu o ✅
  } else {
    // ❌ Falha real: rede, CORS, script 404
    atualizarMsg("⚠️ Envio falhou", "#e74c3c");
    mostrarPopup("Erro de conexão");
    jaEnviado = false;
    console.error("Erro real no envio:", err);
  }
});
    },
    function() {
      clearTimeout(timeout);
      atualizarMsg("");
      alert("📍 GPS indisponível. Permita localização.");
    },
    { enableHighAccuracy: true, timeout: 6000, maximumAge: 60000 }
  );
}
  </script>
</body>
</html>
